apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-td-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: frontend-td-app
  template:
    metadata:
      labels:
        app: frontend-td-app
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
